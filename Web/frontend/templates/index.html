<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPL Agent Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #37003c; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .fpl-header { background: #00ff87; color: #37003c; border-radius: 16px 16px 0 0; padding: 24px; }
        .fpl-header h1 { font-weight: 800; font-size: 1.8rem; margin: 0; }
        .fpl-header p { margin: 4px 0 0; font-size: 0.9rem; opacity: 0.8; }
        .btn-fpl { background: #00ff87; color: #37003c; font-weight: 700; border: none; }
        .btn-fpl:hover { background: #00e07a; color: #37003c; }
    </style>
</head>
<body>
    <div class="col-12 col-md-5">
        <div class="card border-0">
            <div class="fpl-header">
                <h1>FPL Agent Assistant</h1>
                <p>Enter your Manager ID and Auth Token to get started</p>
            </div>
            <div class="card-body p-4">
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form action="/players" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Manager ID</label>
                        <input type="number" name="manager_id" class="form-control" placeholder="e.g. 5125930" required>
                        <div class="form-text">Find this in your FPL profile URL</div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Auth Token</label>
                        <input type="text" name="auth_token" class="form-control" placeholder="Bearer token from FPL website" required>
                        <div class="form-text">Get this from browser dev tools → Network → Authorization header</div>
                    </div>
                    <button type="submit" class="btn btn-fpl w-100 py-2">View My Squad</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
