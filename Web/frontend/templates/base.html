<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FPL Agent Assistant{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .privacy-banner {
            background: rgba(0,0,0,0.5);
            color: #a8e6cf;
            font-size: 0.8rem;
            text-align: center;
            padding: 10px 20px;
            width: 100%;
            position: fixed;
            bottom: 0;
            left: 0;
            z-index: 999;
        }
        body { padding-bottom: 44px; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>

    {% block content %}{% endblock %}

    <div class="privacy-banner">
        &#128274; We do not store any personal information. Your Manager ID and Auth Token are used only for this session and are never saved or shared. This includes sensitive data such as your email address.
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
